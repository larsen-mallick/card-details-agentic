spring.application.name=card-details

# MCP Server Configuration
spring.ai.mcp.server.name=card-details-server
spring.ai.mcp.server.version=1.0.0

# SSE transport endpoints (default for spring-ai-starter-mcp-server-webmvc)
# SSE connection endpoint: GET /sse
# SSE message endpoint: POST /mcp/message
spring.ai.mcp.server.sse-message-endpoint=/mcp/message

# HTTP server enabled on port 8080 (default)
server.port=8080
